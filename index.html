<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>IELTS 练习系统</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=DM+Sans:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet" />
        <link
            rel="icon"
            type="image/svg+xml"
            href="assets/images/favicon.svg"
        />
        <link rel="stylesheet" href="css/main.css" />
        <link rel="stylesheet" href="css/heroui-bridge.css" />
        <link rel="stylesheet" href="css/countdown-timer.css" />
    </head>

    <body class="hero-body" data-theme="ink">
        <input
            type="file"
            id="folder-picker"
            webkitdirectory
            style="display: none"
        />
        <div class="message-container" id="message-container"></div>

        <div class="container hero-shell">
            <div class="hero-header">
                <h1 style="width: 100%">
                    IELTS 练习系统
                </h1>
            </div>

            <nav class="main-nav hero-nav" data-nav-controller="legacy">
                <button
                    class="nav-btn hero-nav__btn active"
                    type="button"
                    data-view="browse"
                >
                    题库
                </button>
                <button
                    class="nav-btn hero-nav__btn"
                    type="button"
                    data-view="practice"
                >
                    练习记录
                </button>
            </nav>

            <!-- 题库浏览页面 -->
            <div id="browse-view" class="view active hero-panel hero-section">
                <div class="browse-title-bar hero-panel__header">
                    <button
                        class="browse-title-trigger"
                        id="browse-title-trigger"
                        type="button"
                        aria-haspopup="true"
                        aria-expanded="false"
                        title="列表偏好"
                    >
                        📚<span
                            class="browse-title-dot"
                            aria-hidden="true"
                        ></span>
                    </button>
                    <h2 id="browse-title" class="hero-panel__title" style="margin: 0;">题库</h2>
                    <div
                        class="browse-preference-panel"
                        id="browse-preference-panel"
                        hidden
                    >
                        <label class="browse-preference-option">
                            <input
                                type="checkbox"
                                id="browse-remember-position"
                            />
                            <span class="browse-preference-text"
                                >列表位置记录</span
                            >
                        </label>
                    </div>
                    <div
                        id="type-filter-buttons"
                        class="hero-panel__actions shui-filter-group shui-segmented-control"
                    >
                        <button
                            class="shui-segmented-btn active"
                            type="button"
                            aria-pressed="true"
                            data-filter-type="all"
                            onclick="filterByType('all')"
                        >
                            全部
                        </button>
                        <button
                            class="shui-segmented-btn"
                            type="button"
                            aria-pressed="false"
                            data-filter-type="reading"
                            onclick="filterByType('reading')"
                        >
                            阅读
                        </button>
                        <button
                            class="shui-segmented-btn"
                            type="button"
                            aria-pressed="false"
                            data-filter-type="listening"
                            onclick="filterByType('listening')"
                        >
                            听力
                        </button>
                    </div>
                </div>

                <div class="search-box">
                    <div class="search-row">
                        <div class="search-input-wrap">
                            <input
                                type="text"
                                class="search-input"
                                id="exam-search-input"
                                placeholder="搜索题目..."
                                aria-label="搜索题目"
                                onkeyup="searchExams(this.value)"
                            />
                            <button
                                type="button"
                                class="search-clear-btn"
                                id="search-clear-btn"
                                aria-label="清除搜索"
                                hidden
                                onclick="clearSearch()"
                            >
                                <svg
                                    viewBox="0 0 24 24"
                                    width="16"
                                    height="16"
                                    stroke="currentColor"
                                    stroke-width="2"
                                    fill="none"
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                >
                                    <line x1="18" y1="6" x2="6" y2="18"></line>
                                    <line x1="6" y1="6" x2="18" y2="18"></line>
                                </svg>
                            </button>
                        </div>
                        <div class="browse-sort-wrapper">
                            <select
                                id="browse-sort-select"
                                class="browse-sort-select"
                                aria-label="题库排序"
                            >
                                <option value="default">默认排序</option>
                                <option value="frequency-desc">
                                    频率高→低
                                </option>
                            </select>
                            <div class="browse-sort-icon">
                                <svg
                                    width="14"
                                    height="14"
                                    viewBox="0 0 14 14"
                                    fill="none"
                                    xmlns="http://www.w3.org/2000/svg"
                                >
                                    <path
                                        d="M3.5 5.25L7 8.75L10.5 5.25"
                                        stroke="currentColor"
                                        stroke-width="1.5"
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                    />
                                </svg>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="exam-list-container"></div>
                <div class="loading">
                    <div class="spinner"></div>
                    <p>正在加载题目列表...</p>
                </div>
            </div>

            <!-- 练习记录页面 -->
            <div id="practice-view" class="view hero-panel hero-section">
                <div class="hero-panel__header">
                    <h2 class="hero-panel__title" style="margin: 0;">练习记录</h2>
                </div>

                <div class="practice-stats hero-grid hero-grid--stats">
                    <div class="hero-card hero-card--stat">
                        <div class="hero-card__label">已练习题目</div>
                        <div class="hero-card__value" id="total-practiced">
                            0
                        </div>
                        <div class="hero-card__meta">累计巩固练习</div>
                    </div>
                    <div class="hero-card hero-card--stat">
                        <div class="hero-card__label">平均正确率</div>
                        <div class="hero-card__value" id="avg-score">0%</div>
                        <div class="hero-card__meta">近期待练表现</div>
                    </div>
                    <div class="hero-card hero-card--stat">
                        <div class="hero-card__label">学习时长(分钟)</div>
                        <div class="hero-card__value" id="study-time">0</div>
                        <div class="hero-card__meta">聚焦沉浸时长</div>
                    </div>
                    <div class="hero-card hero-card--stat">
                        <div class="hero-card__label">连续学习天数</div>
                        <div class="hero-card__value" id="streak-days">0</div>
                        <div class="hero-card__meta">坚持天数</div>
                    </div>
                </div>

                <div class="practice-history hero-panel hero-section">
                    <div class="hero-panel__header">
                        <h3 class="hero-panel__title">
                            练习历史
                        </h3>
                        <div
                            id="record-type-filter-buttons"
                            class="hero-panel__actions shui-filter-group shui-segmented-control"
                        >
                            <button
                                class="shui-segmented-btn active"
                                type="button"
                                aria-pressed="true"
                                data-filter-type="all"
                                onclick="filterRecordsByType('all')"
                            >
                                全部
                            </button>
                            <button
                                class="shui-segmented-btn"
                                type="button"
                                aria-pressed="false"
                                data-filter-type="reading"
                                onclick="filterRecordsByType('reading')"
                            >
                                阅读
                            </button>
                            <button
                                class="shui-segmented-btn"
                                type="button"
                                aria-pressed="false"
                                data-filter-type="listening"
                                onclick="filterRecordsByType('listening')"
                            >
                                听力
                            </button>
                        </div>
                        <div class="hero-panel__actions">
                            <button
                                class="btn btn-secondary hero-btn hero-btn--ghost"
                                onclick="
                                    window.AppActions &&
                                        window.AppActions.exportPracticeMarkdown()
                                "
                            >
                                📄 导出Markdown
                            </button>
                            <button
                                class="btn btn-info hero-btn"
                                onclick="toggleBulkDelete()"
                                id="bulk-delete-btn"
                            >
                                <svg
                                    viewBox="0 0 24 24"
                                    width="1em"
                                    height="1em"
                                    fill="none"
                                    stroke="currentColor"
                                    stroke-width="1.8"
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                    class="ui-emoji-icon"
                                    aria-hidden="true"
                                >
                                    <polyline
                                        points="9 11 12 14 22 4"
                                    ></polyline>
                                    <path
                                        d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"
                                    ></path>
                                </svg>
                                批量删除
                            </button>
                            <button
                                class="btn btn-warning hero-btn hero-btn--warn"
                                onclick="clearPracticeData()"
                            >
                                🗑️ 清除记录
                            </button>
                        </div>
                    </div>
                    <div id="history-list" class="practice-history-list">
                        <div
                            style="
                                text-align: center;
                                padding: 40px;
                                opacity: 0.7;
                            "
                        >
                            <div style="font-size: 3em; margin-bottom: 15px">
                                📋
                            </div>
                            <p>暂无练习记录</p>
                            <p style="font-size: 0.9em; margin-top: 10px">
                                开始练习后，记录将自动保存在这里
                            </p>
                        </div>
                    </div>
                </div>
            </div>

        </div>

        <!-- 简单计时器（做题时显示） -->
        <div
            id="practice-timer"
            class="practice-timer is-hidden"
            role="timer"
            aria-label="做题计时"
        >
            <span id="practice-timer-display" class="practice-timer__time">00:00:00</span>
        </div>

        <!-- 启动与懒加载工具 -->

        <script type="module" src="js/runtime/lazyLoader.js"></script>
        <script src="js/presentation/app-actions.js" defer></script>
        <script src="js/features/countdownTimer.js" defer></script>

        <!-- 基础环境与日志 -->
        <script type="module" src="js/utils/environmentDetector.js"></script>
        <script type="module" src="js/utils/logger.js"></script>
        <script src="js/utils/storage/indexedDBAdapter.js"></script>
        <script src="js/utils/storage/localStorageAdapter.js"></script>
        <script src="js/utils/storage/storageManager.js"></script>
        <script src="js/utils/storage.js"></script>
        <script src="js/core/storageProviderRegistry.js"></script>
        <script src="js/data/dataSources/storageDataSource.js"></script>
        <script src="js/data/repositories/baseRepository.js"></script>
        <script src="js/data/repositories/dataRepositoryRegistry.js"></script>
        <script src="js/data/repositories/practiceRepository.js"></script>
        <script src="js/data/repositories/settingsRepository.js"></script>
        <script src="js/data/repositories/metaRepository.js"></script>
        <script src="js/data/index.js"></script>
        <script type="module" src="js/core/practiceCore.js"></script>
        <script src="js/core/resourceCore.js"></script>
        <script src="assets/generated/reading-exams/manifest.js"></script>
        <script src="assets/generated/listening-exams/manifest.js"></script>
        <script src="js/utils/stateSerializer.js"></script>
        <script src="js/utils/simpleStorageWrapper.js"></script>

        <!-- 工具库与基础视图 -->
        <script type="module" src="js/utils/dom.js"></script>
        <script src="js/presentation/navigation-controller.js"></script>

        <!-- 入口与懒加载代理 -->
        <script type="module" src="js/app/main-entry.js"></script>
        <script src="js/presentation/indexInteractions.js"></script>
        <script src="js/presentation/emojiIconizer.js"></script>
        <script src="js/runtime/boot-fallbacks.js"></script>
        <script src="js/patches/runtime-fixes.js"></script>

        <!-- 应用核心 (bundled) -->
        <script src="assets/dist/app.bundle.js" defer></script>

    </body>
</html>

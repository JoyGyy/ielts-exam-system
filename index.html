<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>IELTS 练习系统</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
        <link
            rel="icon"
            type="image/svg+xml"
            href="assets/images/favicon.svg"
        />
        <link rel="stylesheet" href="css/main.css" />
        <link rel="stylesheet" href="css/heroui-bridge.css" />
        <link rel="stylesheet" href="css/countdown-timer.css" />
        <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
    </head>

    <body data-theme="ink">
        <input
            type="file"
            id="folder-picker"
            webkitdirectory
            style="display: none"
        />
        <div class="message-container" id="message-container"></div>

        <!-- 顶部导航 -->
        <nav class="main-nav" data-nav-controller="legacy">
            <div class="nav-content">
                <div class="nav-title">
                    <div class="nav-title-icon">📚</div>
                    <span>IELTS 练习系统</span>
                </div>
                <div class="nav-tabs">
                    <button class="nav-tab nav-btn active" type="button" data-view="browse">题库</button>
                    <button class="nav-tab nav-btn" type="button" data-view="mistakes">错题本</button>
                    <div class="nav-tab-indicator"></div>
                </div>
                <div class="nav-actions"></div>
            </div>
        </nav>

        <div class="container main-content">

            <!-- 题库浏览页面 -->
            <div id="browse-view" class="view active">
                <div class="page-header">
                    <div class="page-title-row">
                        <h1 class="page-title" id="browse-title">题库</h1>
                        <button class="browse-title-trigger btn btn-ghost btn-icon" id="browse-title-trigger" type="button" aria-haspopup="true" aria-expanded="false" title="列表偏好">⚙</button>
                        <div class="browse-preference-panel" id="browse-preference-panel" hidden>
                            <label class="browse-preference-option">
                                <input type="checkbox" id="browse-remember-position" />
                                <span class="browse-preference-text">列表位置记录</span>
                            </label>
                        </div>
                    </div>
                    <div class="filter-container">
                        <div class="search-container">
                            <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="11" cy="11" r="8"></circle>
                                <path d="m21 21-4.35-4.35"></path>
                            </svg>
                            <input type="text" class="search-input" placeholder="搜索题目..." id="exam-search-input" aria-label="搜索题目" onkeyup="searchExams(this.value)">
                            <button type="button" class="search-clear" id="search-clear-btn" aria-label="清除搜索" hidden onclick="clearSearch()">×</button>
                        </div>
                        <div id="type-filter-buttons" class="segmented-control">
                            <button class="segmented-btn active" type="button" aria-pressed="true" data-filter-type="all" onclick="filterByType('all')">全部</button>
                            <button class="segmented-btn" type="button" aria-pressed="false" data-filter-type="reading" onclick="filterByType('reading')">阅读</button>
                            <button class="segmented-btn" type="button" aria-pressed="false" data-filter-type="listening" onclick="filterByType('listening')">听力</button>
                        </div>
                        <div class="browse-sort-wrapper">
                            <select id="browse-sort-select" class="browse-sort-select" aria-label="题库排序">
                                <option value="default">默认排序</option>
                                <option value="frequency-desc">频率高→低</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div id="exam-list-container" class="card-grid stagger-container"></div>
                <div class="loading">
                    <div class="spinner"></div>
                    <p>正在加载题目列表...</p>
                </div>
            </div>

            <!-- 错题本页面 -->
            <div id="mistakes-view" class="view">
                <div class="page-header">
                    <h1 class="page-title">错题本</h1>
                    <div class="filter-container">
                        <div class="search-container">
                            <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="11" cy="11" r="8"></circle>
                                <path d="m21 21-4.35-4.35"></path>
                            </svg>
                            <input type="text" class="search-input" placeholder="搜索题目..." id="mistake-search-input" aria-label="搜索错题" onkeyup="searchMistakes(this.value)">
                        </div>
                        <div id="mistakes-type-filter" class="segmented-control">
                            <button class="segmented-btn active" type="button" aria-pressed="true" data-filter-type="all" onclick="filterMistakesByType('all')">全部</button>
                            <button class="segmented-btn" type="button" aria-pressed="false" data-filter-type="reading" onclick="filterMistakesByType('reading')">阅读</button>
                            <button class="segmented-btn" type="button" aria-pressed="false" data-filter-type="listening" onclick="filterMistakesByType('listening')">听力</button>
                        </div>
                        <div class="filter-actions">
                            <select class="mistake-sort-select" id="mistake-sort-select" onchange="sortMistakes(this.value)">
                                <option value="date-desc">最新优先</option>
                                <option value="date-asc">最早优先</option>
                            </select>
                            <button class="btn btn-secondary btn-sm" onclick="exportMistakeBook()">导出</button>
                            <button class="btn btn-danger btn-sm" onclick="clearMistakeBook()">清空错题本</button>
                        </div>
                    </div>
                </div>

                <div class="stats-section">
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-label">总错题</div>
                            <div class="stat-value" id="mistake-total">0</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">已掌握</div>
                            <div class="stat-value" id="mistake-mastered">0</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">待复习</div>
                            <div class="stat-value" id="mistake-unmastered">0</div>
                        </div>
                    </div>
                </div>

                <div id="mistake-list" class="mistake-list stagger-container"></div>
            </div>

        </div>

        <!-- 简单计时器（做题时显示） -->
        <div
            id="practice-timer"
            class="practice-timer is-hidden"
            role="timer"
            aria-label="做题计时"
        >
            <span id="practice-timer-display" class="practice-timer__time">00:00:00</span>
        </div>

        <!-- 启动与懒加载工具 -->

        <script type="module" src="js/runtime/lazyLoader.js"></script>
        <script src="js/presentation/app-actions.js" defer></script>
        <script src="js/features/countdownTimer.js" defer></script>

        <!-- 基础环境与日志 -->
        <script type="module" src="js/utils/environmentDetector.js"></script>
        <script type="module" src="js/utils/logger.js"></script>
        <script src="js/utils/storage/indexedDBAdapter.js"></script>
        <script src="js/utils/storage/localStorageAdapter.js"></script>
        <script src="js/utils/storage/storageManager.js"></script>
        <script src="js/utils/storage.js"></script>
        <script src="js/core/storageProviderRegistry.js"></script>
        <script src="js/data/dataSources/storageDataSource.js"></script>
        <script src="js/data/repositories/baseRepository.js"></script>
        <script src="js/data/repositories/dataRepositoryRegistry.js"></script>
        <script src="js/data/repositories/practiceRepository.js"></script>
        <script src="js/data/repositories/settingsRepository.js"></script>
        <script src="js/data/repositories/metaRepository.js"></script>
        <script src="js/data/index.js"></script>
        <script src="js/data/mistakeBook.js"></script>
        <script src="js/utils/questionExtractor.js"></script>
        <script type="module" src="js/core/practiceCore.js"></script>
        <script src="js/core/resourceCore.js"></script>
        <script src="assets/generated/reading-exams/manifest.js"></script>
        <script src="assets/generated/listening-exams/manifest.js"></script>
        <script src="js/utils/stateSerializer.js"></script>
        <script src="js/utils/simpleStorageWrapper.js"></script>

        <!-- 工具库与基础视图 -->
        <script type="module" src="js/utils/dom.js"></script>
        <script src="js/presentation/navigation-controller.js"></script>
        <script src="js/presentation/mistakeBookView.js"></script>

        <!-- 入口与懒加载代理 -->
        <script type="module" src="js/app/main-entry.js"></script>
        <script src="js/presentation/indexInteractions.js"></script>
        <script src="js/presentation/emojiIconizer.js"></script>
        <script src="js/runtime/boot-fallbacks.js"></script>
        <script src="js/patches/runtime-fixes.js"></script>

        <!-- 应用核心 (source) -->
        <script type="module" src="js/app/app.js"></script>

        <!-- UI 增强: 涟漪效果、Toast、图表 -->
        <script src="js/animations/ripple.js"></script>
        <script src="js/animations/toast.js"></script>
        <script src="js/charts/accuracy.js"></script>
        <script src="js/charts/practice.js"></script>
        <script src="js/charts/trend.js"></script>
        <script>
            document.addEventListener('DOMContentLoaded', function() {
                if (window.Ripple) Ripple.init();
                if (window.Toast) Toast.init();
            });
        </script>

    </body>
</html>
